<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="public, max-age=604800" />
    <meta http-equiv="Pragma" content="cache" />
    <meta name="color-scheme" content="light dark" />
    <meta name="description" content="Guest book reviews for App Privacy Policy Generator - See what users are saying about this free, open-source privacy policy generator." />
    <script src="/js/reviewThemeToggle.min.js"></script>
    <title>Guest Book - App Privacy Policy Generator</title>
    <link rel="stylesheet" href="/css/reviews.min.css" />
  </head>
  <body>
    <div class="page">
      <div class="top-logo">
        <a href="/"><img src="/images/text_logo/text_logo.svg" data-theme-logo="true" alt="App Privacy Policy Generator" /></a>
      </div>

      <div class="top-row">
        <div class="search-bar">
          <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" id="searchInput" class="search-input" placeholder="Search reviews..." />
          <button id="clearBtn" class="clear-btn" aria-label="Clear search">&times;</button>
        </div>
        <div class="result-count" id="resultCount">623 reviews</div>
      </div>

      <div class="top-links">
        <a href="/">Back to Web App</a>
        / 
        <a href="https://ko-fi.com/A443EQ6" target="_blank">Buy Me a Coffee</a>
        / 
        <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme" style="display:none">🌙</button>
      </div>

      <div class="no-results" id="noResults">No reviews match your search.</div>

      <div class="review-grid" id="reviewContainer">
        <div class="skeleton-card"><div class="skeleton-header"><div class="skeleton-avatar"></div><div class="skeleton-lines"><div class="skeleton-line skeleton-line--short"></div><div class="skeleton-line skeleton-line--long"></div></div></div><div class="skeleton-body"><div class="skeleton-line skeleton-line--long"></div><div class="skeleton-line skeleton-line--long"></div><div class="skeleton-line skeleton-line--short"></div></div></div>
        <div class="skeleton-card"><div class="skeleton-header"><div class="skeleton-avatar"></div><div class="skeleton-lines"><div class="skeleton-line skeleton-line--short"></div><div class="skeleton-line skeleton-line--long"></div></div></div><div class="skeleton-body"><div class="skeleton-line skeleton-line--long"></div><div class="skeleton-line skeleton-line--long"></div><div class="skeleton-line skeleton-line--short"></div></div></div>
        <div class="skeleton-card"><div class="skeleton-header"><div class="skeleton-avatar"></div><div class="skeleton-lines"><div class="skeleton-line skeleton-line--short"></div><div class="skeleton-line skeleton-line--long"></div></div></div><div class="skeleton-body"><div class="skeleton-line skeleton-line--long"></div><div class="skeleton-line skeleton-line--long"></div><div class="skeleton-line skeleton-line--short"></div></div></div>
        
      </div>

      <div class="pagination" id="pagination">
        <button id="firstBtn" aria-label="First page">&laquo;</button>
        <button id="prevBtn" aria-label="Previous page">&lsaquo;</button>
        <span class="page-info" id="pageInfo"></span>
        <button id="nextBtn" aria-label="Next page">&rsaquo;</button>
        <button id="lastBtn" aria-label="Last page">&raquo;</button>
      </div>
    </div>

    <script src="/js/reviewsMain.min.js"></script>
  </body>
</html>
